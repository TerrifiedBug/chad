name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Run the backend suite inside the project's canonical dev container
      # (docker-compose.dev.yml) instead of on the bare runner. The container
      # provides the environment the tests are written for — working dir /app,
      # DEBUG=true, the "chad" DB, ALLOW_INTERNAL_WEBHOOK_IPS — so the tests that
      # are coupled to it (audit-export CLI, csrf debug-origin, MISP sync) run
      # here too; no --deselect needed. The compose backend defaults its secrets
      # and DB, so no extra env is required.
      # NOTE: tests/integration still needs a provisioned OpenSearch (indices +
      # data) which docker-compose.dev.yml does not define, so it remains
      # excluded here — see plans/013 for restoring it.
      - name: Start test dependencies (postgres, redis)
        run: docker compose -f docker-compose.dev.yml up -d postgres redis

      - name: Build backend image
        run: docker compose -f docker-compose.dev.yml build backend

      # No --cov: pytest-cov is not in the backend image (requirements.txt ships
      # pytest + pytest-asyncio only). Coverage upload was best-effort/non-gating
      # anyway; the gating signal is pass/fail.
      # Override ALLOW_INTERNAL_WEBHOOK_IPS=false: the dev compose sets it true (a
      # convenience for the mock-webhook service) which disables the SSRF guard that
      # the SSRF tests assert. The webhook CRUD happy-path tests patch it True
      # themselves, so they still pass with the ambient default off.
      - name: Run backend tests (in container)
        run: |
          docker compose -f docker-compose.dev.yml run --rm \
            -e ALLOW_INTERNAL_WEBHOOK_IPS=false backend \
            pytest --ignore=tests/integration

      - name: Lint (ruff)
        run: docker compose -f docker-compose.dev.yml run --rm backend ruff check .

      - name: Typecheck (mypy, non-blocking)
        continue-on-error: true
        run: docker compose -f docker-compose.dev.yml run --rm backend mypy app

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run lint
        run: |
          cd frontend
          npm run lint

      - name: Run tests
        run: |
          cd frontend
          npm test -- --passWithNoTests

      - name: Build
        run: |
          cd frontend
          npm run build

  # Validates k6 scripts compile correctly (no actual HTTP requests)
  validate-k6-scripts:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Validate k6 scripts
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          for script in log-ingestion.js baseline.js stress.js; do
            echo "Validating $script..."
            docker run --rm \
              -v "${WORKSPACE}/tests/load/scripts:/scripts" \
              grafana/k6 inspect /scripts/$script
          done
          echo "All k6 scripts validated successfully"
