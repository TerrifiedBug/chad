server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Only log 4xx and 5xx responses (see nginx-logging.conf for $loggable map)
    access_log /var/log/nginx/access.log combined if=$loggable;

    # Allow large payloads for log ingestion from Vector/Fluentd (50MB cap;
    # tune shipper batching rather than raising this).
    client_max_body_size 50m;
    client_body_buffer_size 5m;

    # --- Suite path prefix -------------------------------------------------
    # The SPA is built with Vite base '/chad/' and always lives under /chad/,
    # behind suite-nginx and standalone alike. Strip the prefix internally so
    # every location below keeps working on unprefixed paths.
    location = / { return 302 /chad/$is_args$args; }
    location = /chad { return 302 /chad/$is_args$args; }
    location /chad/ {
        # exact /chad/ -> SPA shell; deeper paths -> strip prefix, re-match
        rewrite ^/chad/$ /index.html last;
        rewrite ^/chad/(.+)$ /$1 last;
    }

    # Hashed build assets are content-addressed and immutable — cache hard.
    # A MISSING asset must return 404, never fall back to index.html.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — clients must pick up new asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback (reached via the /chad/ strip above).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — reached as /chad/api/... (stripped above) and as legacy
    # /api/... (existing Vector/Fluentd shippers posting to /api/logs/).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSockets — prefix WITHOUT trailing slash so the bare /ws socket
    # (Health/SystemLogs/deploy-progress) matches as well as /ws/alerts.
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
